<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEPHILE - SINHALA SUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e50914; --bg: #080808; --card-bg: #141414; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }
        
        /* Navbar */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 12px 5%; background: #000; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .logo { font-size: 1.6rem; font-weight: bold; color: var(--primary); letter-spacing: 1px; }
        .search-box { background: #222; padding: 6px 15px; border-radius: 20px; display: flex; align-items: center; }
        .search-box input { background: transparent; border: none; color: white; outline: none; width: 140px; font-size: 0.9rem; }

        /* පින්තූරයේ තිබූ මෙනු එක (Navigation Menu) */
        .navigation-menu { padding: 20px 5%; display: flex; flex-direction: column; align-items: center; gap: 15px; background: #0c0c0c; border-bottom: 1px solid #1a1a1a; }
        
        .type-tabs { display: flex; gap: 12px; }
        .type-btn { background: #222; color: #fff; border: none; padding: 12px 35px; border-radius: 30px; cursor: pointer; font-weight: 600; font-size: 1rem; transition: 0.3s; }
        .type-btn.active { background: var(--primary); box-shadow: 0 0 20px rgba(229, 9, 20, 0.4); }

        .genre-scroll { display: flex; gap: 10px; overflow-x: auto; width: 100%; justify-content: center; padding: 5px 0; scrollbar-width: none; }
        .genre-scroll::-webkit-scrollbar { display: none; }
        .genre-btn { background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 8px 18px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .genre-btn:hover, .genre-btn.active { border-color: var(--primary); color: white; background: rgba(229, 9, 20, 0.1); }

        /* Movie Grid (කුඩා පෝස්ටර්) */
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 15px; padding: 25px 5% 50px; }
        .movie-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; transition: 0.4s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .movie-card:hover { transform: translateY(-8px); box-shadow: 0 8px 25px rgba(229, 9, 20, 0.2); }
        .movie-card img { width: 100%; height: 205px; object-fit: cover; }
        .card-info { padding: 10px; font-size: 0.8rem; text-align: center; font-weight: 500; }
        .sub-badge { position: absolute; top: 8px; left: 8px; background: #00b894; color: white; font-size: 0.65rem; padding: 3px 8px; border-radius: 5px; font-weight: bold; z-index: 5; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

        /* Modal & Player */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 2000; overflow-y: auto; }
        .modal-content { margin: 2% auto; width: 95%; max-width: 900px; background: #111; border-radius: 20px; padding: 25px; position: relative; border: 1px solid #333; }
        .close-btn { position: absolute; top: 15px; right: 25px; font-size: 40px; cursor: pointer; color: #fff; line-height: 1; }
        
        .player-selector { display: flex; gap: 10px; margin: 20px 0; }
        .p-btn { background: #333; color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; flex: 1; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }
        .p-btn.active { background: var(--primary); }

        iframe { width: 100%; height: 480px; border: none; border-radius: 12px; background: #000; box-shadow: 0 0 30px rgba(0,0,0,0.5); }

        @media (max-width: 600px) { 
            iframe { height: 260px; } 
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); }
            .type-btn { padding: 10px 25px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CINEPHILE</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="සොයන්න...">
            <button onclick="searchMovies()" style="background:none; border:none; color:white; cursor:pointer; font-size: 1.1rem;">🔍</button>
        </div>
    </nav>

    <div class="navigation-menu">
        <div class="type-tabs">
            <button class="type-btn active" id="movieTab" onclick="switchType('movie')">Movies</button>
            <button class="type-btn" id="tvTab" onclick="switchType('tv')">TV Series</button>
        </div>
        <div class="genre-scroll">
            <button class="genre-btn active" onclick="fetchMovies()">All</button>
            <button class="genre-btn" onclick="filterGenre(28)">Action</button>
            <button class="genre-btn" onclick="filterGenre(35)">Comedy</button>
            <button class="genre-btn" onclick="filterGenre(27)">Horror</button>
            <button class="genre-btn" onclick="filterGenre(10749)">Romance</button>
            <button class="genre-btn" onclick="filterGenre(878)">Sci-Fi</button>
            <button class="genre-btn" onclick="filterGenre(16)">Animation</button>
        </div>
    </div>

    <div class="movie-grid" id="movieGrid"></div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalHeader"></div>
            
            <div class="player-selector">
                <button id="csBtn" class="p-btn active" onclick="setPlayer('cs')">PlayerLK (Sinhala Sub)</button>
                <button id="evoBtn" class="p-btn" onclick="setPlayer('evo')">Evo Player</button>
            </div>
            
            <div id="playerWrapper"></div>
        </div>
    </div>

    <script>
        const API_KEY = '58d21bb219448b8bbd868e6440bf49f9';
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';
        let currentType = 'movie';
        let currentID = '';

        window.onload = () => fetchMovies();

        function switchType(type) {
            currentType = type;
            document.getElementById('movieTab').classList.toggle('active', type === 'movie');
            document.getElementById('tvTab').classList.toggle('active', type === 'tv');
            fetchMovies();
        }

        async function fetchMovies(customUrl = '') {
            const url = customUrl || `https://api.themoviedb.org/3/discover/${currentType}?api_key=${API_KEY}&sort_by=popularity.desc`;
            const res = await fetch(url);
            const data = await res.json();
            displayMovies(data.results);
        }

        function displayMovies(movies) {
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = '';
            movies.forEach(m => {
                const title = m.title || m.name;
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => openModal(m);
                card.innerHTML = `
                    <div class="sub-badge">SINHALA SUB</div>
                    <img src="${m.poster_path ? IMG_URL + m.poster_path : 'https://via.placeholder.com/200x300'}" alt="${title}">
                    <div class="card-info">${title}</div>
                `;
                grid.appendChild(card);
            });
        }
