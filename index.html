<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEPHILE - SINHALA SUB MOVIES</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e50914; --bg: #080808; --card-bg: #141414; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }
        
        /* Navbar */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 12px 5%; background: #000; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .logo { font-size: 1.6rem; font-weight: bold; color: var(--primary); letter-spacing: 1px; }
        .search-box { background: #222; padding: 6px 15px; border-radius: 20px; display: flex; align-items: center; }
        .search-box input { background: transparent; border: none; color: white; outline: none; width: 140px; font-size: 0.9rem; }

        /* Navigation Menu (As in your photo) */
        .navigation-menu { padding: 20px 5%; display: flex; flex-direction: column; align-items: center; gap: 15px; background: #0c0c0c; border-bottom: 1px solid #1a1a1a; }
        .type-tabs { display: flex; gap: 12px; }
        .type-btn { background: #222; color: #fff; border: none; padding: 10px 30px; border-radius: 30px; cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: 0.3s; }
        .type-btn.active { background: var(--primary); box-shadow: 0 0 20px rgba(229, 9, 20, 0.4); }

        .genre-scroll { display: flex; gap: 8px; overflow-x: auto; width: 100%; justify-content: center; padding: 5px 0; scrollbar-width: none; }
        .genre-scroll::-webkit-scrollbar { display: none; }
        .genre-btn { background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 6px 15px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; }
        .genre-btn:hover { border-color: var(--primary); color: white; }

        /* Movie Grid (Compact Posters) */
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; padding: 20px 5% 50px; min-height: 400px; }
        .movie-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; transition: 0.4s ease; }
        .movie-card:hover { transform: translateY(-8px); box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .movie-card img { width: 100%; height: 195px; object-fit: cover; }
        .card-info { padding: 8px; font-size: 0.75rem; text-align: center; font-weight: 500; height: 35px; overflow: hidden; }
        .sub-badge { position: absolute; top: 8px; left: 8px; background: #00b894; color: white; font-size: 0.6rem; padding: 3px 7px; border-radius: 5px; font-weight: bold; z-index: 5; }

        /* Modal & Player */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 2000; overflow-y: auto; }
        .modal-content { margin: 2% auto; width: 95%; max-width: 900px; background: #111; border-radius: 20px; padding: 20px; position: relative; border: 1px solid #333; }
        .close-btn { position: absolute; top: 15px; right: 25px; font-size: 35px; cursor: pointer; color: #fff; z-index: 2100; }
        
        .player-selector { display: flex; gap: 10px; margin: 15px 0; }
        .p-btn { background: #333; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; flex: 1; font-weight: bold; font-size: 0.85rem; }
        .p-btn.active { background: var(--primary); }

        iframe { width: 100%; height: 480px; border: none; border-radius: 12px; background: #000; }

        @media (max-width: 600px) { 
            iframe { height: 250px; } 
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CINEPHILE</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="සොයන්න...">
            <button onclick="searchMovies()" style="background:none; border:none; color:white; cursor:pointer;">🔍</button>
        </div>
    </nav>

    <div class="navigation-menu">
        <div class="type-tabs">
            <button class="type-btn active" id="movieTab" onclick="switchType('movie')">Movies</button>
            <button class="type-btn" id="tvTab" onclick="switchType('tv')">TV Series</button>
        </div>
        <div class="genre-scroll">
            <button class="genre-btn" onclick="fetchMovies()">All</button>
            <button class="genre-btn" onclick="filterGenre(28)">Action</button>
            <button class="genre-btn" onclick="filterGenre(35)">Comedy</button>
            <button class="genre-btn" onclick="filterGenre(27)">Horror</button>
            <button class="genre-btn" onclick="filterGenre(10749)">Romance</button>
            <button class="genre-btn" onclick="filterGenre(878)">Sci-Fi</button>
        </div>
    </div>

    <div class="movie-grid" id="movieGrid">
        <p style="text-align:center; width:100%; margin-top:50px;">Load වෙමින් පවතී...</p>
    </div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalHeader"></div>
            
            <div class="player-selector">
                <button id="csBtn" class="p-btn active" onclick="setPlayer('cs')">PlayerLK (Sinhala Sub)</button>
                <button id="evoBtn" class="p-btn" onclick="setPlayer('evo')">Evo Player</button>
            </div>
            
            <div id="playerWrapper"></div>
        </div>
    </div>

    <script>
        // ඔබේ නිවැරදි API Key එක මෙහි ඇතුළත් කර ඇත
        const API_KEY = '58d21bb219448b8bbd868e6440bf49f9';
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';
        let currentType = 'movie';
        let currentID = '';

        // මුලින්ම Movies load කිරීම
        window.onload = () => fetchMovies();

        async function fetchMovies(customUrl = '') {
            const url = customUrl || `https://api.themoviedb.org/3/discover/${currentType}?api_key=${API_KEY}&sort_by=popularity.desc`;
            
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('API Error');
                const data = await res.json();
                
                if(data.results && data.results.length > 0) {
                    displayMovies(data.results);
                } else {
                    document.getElementById('movieGrid').innerHTML = '<p style="text-align:center; width:100%;">කිසිදු දත්තයක් හමු නොවීය.</p>';
                }
            } catch (error) {
                console.error("Fetch error:", error);
                document.getElementById('movieGrid').innerHTML = '<p style="text-align:center; width:100%;">දත්ත ලබා ගැනීමට නොහැකි විය. API Key එක හෝ Internet පරීක්ෂා කරන්න.</p>';
            }
        }

        function displayMovies(movies) {
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = '';
            movies.forEach(m => {
                const title = m.title || m.name;
                if(!m.poster_path) return; // පෝස්ටර් නැති ඒවා ඉවත් කරයි

                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => openModal(m);
                card.innerHTML = `
                    <div class="sub-badge">SINHALA SUB</div>
                    <img src="${IMG_URL + m.poster_path}" alt="${title}">
                    <div class="card-info">${title}</div>
                `;
                grid.appendChild(card);
            });
        }

        function switchType(type) {
            currentType = type;
            document.getElementById('movieTab').classList.toggle('active', type === 'movie');
            document.getElementById('tvTab').classList.toggle('active', type === 'tv');
            fetchMovies();
        }

        function openModal(m) {
            currentID = m.id;
            const title = m.title || m.name;
            document.getElementById('modalHeader').innerHTML = `<h2 style="color:var(--primary); margin:0 0 10px 0;">${title}</h2>`;
            setPlayer('cs');
            document.getElementById('movieModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function setPlayer(p) {
            const wrapper = document.getElementById('playerWrapper');
            const csBtn = document.getElementById('csBtn');
            const evoBtn = document.getElementById('evoBtn');
            
            let url = (p === 'cs') 
                ? `https://playerlk.com/embed.php?tmdb=${currentID}&type=${currentType}`
                : `https://vidsrc.to/embed/${currentType}/${currentID}`;

            csBtn.classList.toggle('active', p === 'cs');
            evoBtn.classList.toggle('active', p === 'evo');
            wrapper.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
        }

        function closeModal() {
            document.getElementById('movieModal').style.display = 'none';
            document.getElementById('playerWrapper').innerHTML = '';
            document.body.style.overflow = 'auto';
        }

        function searchMovies() {
            const val = document.getElementById('searchInput').value;
            if(val) fetchMovies(`https://api.themoviedb.org/3/search/${currentType}?api_key=${API_KEY}&query=${encodeURIComponent(val)}`);
        }

        function filterGenre(id) {
            fetchMovies(`https://api.themoviedb.org/3/discover/${currentType}?api_key=${API_KEY}&with_genres=${id}`);
        }
    </script>
</body>
</html>
